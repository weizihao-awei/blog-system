# 生产环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your_prod_db_password
  mail:
    username: your_prod_email@qq.com
    password: your_prod_authorization_code

server:
  port: 8081

logging:
  level:
    com.ykw.blog_system: warn

# 生产环境禁用 Knife4j
knife4j:
  enable: false

# 生产环境禁用 Swagger
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
